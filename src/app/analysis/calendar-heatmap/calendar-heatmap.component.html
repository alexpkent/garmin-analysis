<div class="heatmap-card" [class.fullscreen]="fullscreen">
  <div class="heatmap-header">
    <span class="heatmap-title">{{ title }}</span>
    <div class="heatmap-period-nav">
      <button class="period-nav-btn" (click)="periodBack.emit()" [disabled]="!canGoBack" aria-label="Previous year">
        <i class="fas fa-chevron-left"></i>
      </button>
      <span class="heatmap-period">{{ periodLabel }}</span>
      <button class="period-nav-btn" (click)="periodForward.emit()" [disabled]="!canGoForward" aria-label="Next year">
        <i class="fas fa-chevron-right"></i>
      </button>
      <button class="period-nav-btn" (click)="toggleFullscreen()" [attr.aria-label]="fullscreen ? 'Exit fullscreen' : 'Fullscreen'">
        <i [class]="fullscreen ? 'fas fa-compress' : 'fas fa-expand'"></i>
      </button>
    </div>
  </div>

  <div class="heatmap-scroll" #scrollEl>
    <div class="heatmap-grid">
      <!-- Day-of-week labels -->
      <div class="dow-col">
        <div class="month-label-spacer"></div>
        @for (day of DAY_LABELS; track day) {
          <div class="dow-label">{{ day }}</div>
        }
      </div>

      <!-- Week columns -->
      @for (week of weeks; track $index) {
        <div class="week-col">
          <div class="month-label">{{ week.monthLabel ?? '' }}</div>
          @for (cell of week.days; track $index) {
            @if (cell) {
              <div class="day-cell"
                   [class.day-cell--clickable]="cell.activities.length > 0"
                   [style.background-color]="cellColor(cell)"
                   [title]="cell.tooltip"
                   (click)="openCell(cell)">
              </div>
            } @else {
              <div class="day-cell day-cell--empty"></div>
            }
          }
        </div>
      }
    </div>
  </div>

  <!-- Legend -->
  <div class="heatmap-legend">
    <span class="legend-item">
      <span class="legend-swatch" style="background: var(--cell-empty)"></span>
      No activity
    </span>
    @for (band of bands; track band.label) {
      <span class="legend-item">
        <span class="legend-swatch" [style.background]="band.color"></span>
        {{ band.label }}
      </span>
    }
  </div>
</div>
