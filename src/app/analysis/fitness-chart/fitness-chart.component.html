<div class="trend-card">
  <div class="trend-header">
    <div class="trend-title-group">
      <span class="trend-title">Fitness &amp; Fatigue</span>
      <span class="trend-subtitle">CTL = fitness &nbsp;·&nbsp; ATL = fatigue &nbsp;·&nbsp; TSB = form</span>
    </div>
    <div class="trend-period-nav">
      <button class="period-nav-btn" (click)="periodBack.emit()" [disabled]="!canGoBack" aria-label="Previous year">
        <i class="fas fa-chevron-left"></i>
      </button>
      <span class="trend-period">{{ periodLabel }}</span>
      <button class="period-nav-btn" (click)="periodForward.emit()" [disabled]="!canGoForward" aria-label="Next year">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </div>
  <div class="trend-chart-wrap">
    <canvas #canvas></canvas>
  </div>
  <div class="trend-hint">CTL rises with consistent training &nbsp;·&nbsp; ATL spikes after hard weeks &nbsp;·&nbsp; positive TSB = fresh &nbsp;·&nbsp; Click legend to toggle</div>
</div>
